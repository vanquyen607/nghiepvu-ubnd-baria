<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - UBND Bà Rịa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background: #0b1120; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

    .auth-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
                 background: #0b1120; padding: 2rem 1rem; position: relative; overflow: hidden; }
    .auth-bg { position: absolute; inset: 0; overflow: hidden; }
    .auth-bg .gradient { position: absolute; top: -30%; right: -15%; width: 500px; height: 500px;
                          background: radial-gradient(circle, rgba(59,130,246,.1) 0%, transparent 70%); border-radius: 50%; }
    .auth-bg .grid { position: absolute; inset: 0;
                     background-image: linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
                                       linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
                     background-size: 60px 60px; }

    .auth-wrapper { position: relative; z-index: 1; width: 100%; }
    .auth-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
                 border-radius: 20px; padding: 2.5rem; max-width: 420px; width: 100%;
                 margin: 0 auto; backdrop-filter: blur(10px); }
    .auth-card .auth-logo { width: 48px; height: 48px; border-radius: 14px;
                             background: linear-gradient(135deg, #3b82f6, #8b5cf6);
                             display: flex; align-items: center; justify-content: center;
                             color: #fff; font-weight: 800; font-size: 1.2rem; margin: 0 auto 1rem; }
    .auth-card h4 { color: #fff; font-weight: 700; font-size: 1.2rem; margin-bottom: .3rem; text-align: center; }
    .auth-card p.sub { color: #64748b; font-size: .85rem; margin-bottom: 1.75rem; text-align: center; }
    .auth-card .form-label { color: #94a3b8; font-size: .8rem; font-weight: 600; margin-bottom: .3rem; }
    .auth-card .form-control { background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1);
                                color: #fff; border-radius: 10px; padding: .7rem 1rem;
                                font-size: .9rem; transition: all .2s; }
    .auth-card .form-control:focus { background: rgba(255,255,255,.08); border-color: #3b82f6;
                                     box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .auth-card .form-control::placeholder { color: #475569; }
    .auth-card .btn-primary { width: 100%; padding: .75rem; border-radius: 10px; font-weight: 600;
                              background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none;
                              box-shadow: 0 4px 16px rgba(59,130,246,.3); transition: all .2s; }
    .auth-card .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,.4); }
    .auth-card .auth-link { color: #64748b; font-size: .85rem; text-align: center; margin-top: 1.25rem; }
    .auth-card .auth-link a { color: #93c5fd; text-decoration: none; font-weight: 500; }
    .auth-card .auth-link a:hover { text-decoration: underline; }

    .password-wrap { position: relative; }
    .password-wrap .toggle-pass { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
                                  background: none; border: none; color: #64748b; cursor: pointer; padding: 0;
                                  font-size: 1.1rem; }
    .password-wrap .toggle-pass:hover { color: #94a3b8; }

    .alert-msg { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.2);
                 border-radius: 10px; color: #fca5a5; padding: .65rem 1rem;
                 font-size: .82rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .alert-msg.success { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.2); color: #86efac; }

    .form-check-label { color: #94a3b8; font-size: .82rem; }
    .back-link { text-align: center; margin-top: 1rem; }
    .back-link a { color: #64748b; font-size: .82rem; text-decoration: none; }
    .back-link a:hover { color: #94a3b8; }

    @media (max-width: 480px) {
      .auth-card { padding: 1.75rem; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg">
      <div class="gradient"></div>
      <div class="grid"></div>
    </div>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">UB</div>
        <h4>Đăng nhập</h4>
        <p class="sub">Đăng nhập để tiếp tục sử dụng hệ thống</p>

        {% if error %}
        <div class="alert-msg">
          <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="alert-msg success">
          <i class="bi bi-check-circle"></i> {{ success }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="nhap@email.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <div class="password-wrap">
              <input type="password" class="form-control" name="password" id="password" placeholder="••••••••" required>
              <button type="button" class="toggle-pass" onclick="togglePass()">
                <i class="bi bi-eye-slash" id="passIcon"></i>
              </button>
            </div>
          </div>
          <div class="mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" name="remember" style="border-color:rgba(255,255,255,.2);">
              <label class="form-check-label" for="remember">Ghi nhớ</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
          </button>
        </form>

        <div class="auth-link">
          Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
        </div>
        <div class="back-link">
          <a href="/"><i class="bi bi-arrow-left me-1"></i> Quay lại trang giới thiệu</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function togglePass() {
      const p = document.getElementById('password');
      const i = document.getElementById('passIcon');
      if (p.type === 'password') {
        p.type = 'text';
        i.className = 'bi bi-eye';
      } else {
        p.type = 'password';
        i.className = 'bi bi-eye-slash';
      }
    }
  </script>
</body>
</html>
